# .github/workflows/actualizar_peru.yml
# Genera data_peru.json (serie mensual nacional por mineral, BCRP/INEI/MINEM)
# y lo commitea junto al tablero. El runner de GitHub SÍ alcanza el BCRP
# (no hay CORS del lado servidor), así que esto funciona aunque tu red lo bloquee.
#
# Requisitos:
#   1) Coloca actualizar_peru_bcrp.py y dashboard_produccion_minera_peru.html en el repo.
#   2) Guarda este archivo en .github/workflows/actualizar_peru.yml
#   3) Settings -> Actions -> General -> Workflow permissions -> "Read and write".
#   4) (Opcional) Ejecuta manualmente: pestaña Actions -> "Actualizar producción Perú (BCRP)" -> Run workflow.

name: Actualizar producción Perú (BCRP)

on:
  schedule:
    - cron: "0 12 6 * *"      # día 6 de cada mes, 12:00 UTC (el BEM/BCRP publica a inicios de mes)
  workflow_dispatch: {}        # botón manual

permissions:
  contents: write

jobs:
  actualizar:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Instalar dependencias
        run: pip install requests

      - name: Descargar BCRP -> data_peru.json
        run: python actualizar_peru_bcrp.py

      - name: Commit si hay cambios
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          if [ -n "$(git status --porcelain data_peru.json)" ]; then
            git add data_peru.json
            git commit -m "Actualiza data_peru.json (BCRP) [skip ci]"
            git push
            echo "data_peru.json actualizado."
          else
            echo "Sin cambios en data_peru.json."
          fi
